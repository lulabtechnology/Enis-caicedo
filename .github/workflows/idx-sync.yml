name: IDX Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import IDX to Supabase
        run: npm run idx:import:supabase
        env:
          IDX_FTP_HOST: ${{ secrets.IDX_FTP_HOST }}
          IDX_FTP_USER: ${{ secrets.IDX_FTP_USER }}
          IDX_FTP_PASSWORD: ${{ secrets.IDX_FTP_PASSWORD }}
          IDX_FTP_SECURE: ${{ secrets.IDX_FTP_SECURE }}
          IDX_FEEDS: ${{ secrets.IDX_FEEDS }}
          IDX_DOWNLOAD_PHOTOS: ${{ secrets.IDX_DOWNLOAD_PHOTOS }}
          IDX_MAX_PHOTOS_PER_LISTING: ${{ secrets.IDX_MAX_PHOTOS_PER_LISTING }}
          IDX_DATA_DRIVER: supabase
          IDX_STORAGE_DRIVER: supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
